<ul class="ll-menu-track">

<section class="ll-search-stage">

<h1 class="ll-main-title">Emergency Blood Search</h1>

<p class="ll-subtext">
Find available blood donors and blood banks near you instantly
</p>

<div class="ll-form-card">

<label class="ll-label-text">Blood Group</label>

<select class="ll-input-field">
<option>Select blood group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>


<label class="ll-label-text">City / Location</label>

<input type="text"
class="ll-input-field"
placeholder="Enter city or location">


<div class="ll-urgent-box">
<input type="checkbox">
<span>This is an urgent request</span>
</div>


<button class="ll-search-trigger">
🔍 Search Blood Availability
</button>

</div>

</section>
